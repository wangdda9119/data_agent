services:
  - type: web
    name: sch-ai-chatbot
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd frontend/sch-landing-vue
      npm install
      npm run build
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "20"
